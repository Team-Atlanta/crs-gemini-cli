name: crs-gemini-cli
type:
  - bug-fixing
version: 1.0.0
docker_registry: ghcr.io/team-atlanta/crs-gemini-cli

prepare_phase:
  hcl: oss-crs/docker-bake.hcl

target_build_phase:
  - name: default-build
    dockerfile: oss-crs/builder.Dockerfile
    outputs:
      - build
      - src
  - name: inc-builder-asan
    snapshot: true
    dockerfile: oss-crs-infra:default-builder
    additional_env:
      SANITIZER: address

crs_run_phase:
  patcher:
    dockerfile: oss-crs/patcher.Dockerfile
    additional_env:
      # Set via compose yaml additional_env.
      CRS_AGENT: gemini_cli
      # GEMINI_CLI_VERSION: "0.28.2"  # Optional prepare-phase override for base image build
      # GEMINI_MODEL: gemini-3-pro-preview  # Optional override (default if unset)
      # AGENT_TIMEOUT: "0"  # seconds, 0 = no limit (default)
  inc-builder-asan:
    run_snapshot: true
    dockerfile: oss-crs-infra:default-builder

supported_target:
  mode:
    - full
    - delta
  language:  # language-agnostic — agent edits source, builder sidecar handles compilation
    - c
    - c++
    - jvm
  sanitizer:
    - address
  architecture:
    - x86_64

required_llms:
  - gemini-3-pro-preview
