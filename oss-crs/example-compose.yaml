##############################################################################
#                        CRS Compose Configuration                           #
#              Example for crs-gemini-cli                                    #
##############################################################################

# --- General Settings -------------------------------------------------------
run_env: local
docker_registry: local

# --- Infrastructure ---------------------------------------------------------
oss_crs_infra:
  cpuset: "0-1"
  memory: "8G"

# --- CRS (crs-gemini-cli) ---------------------------------------------------
# Builder sidecars are declared in crs.yaml (snapshot: true / run_snapshot: true)
# and handled automatically by the framework — no separate entry needed.
crs-gemini-cli:
  source:
    local_path: /path/to/crs-gemini-cli            # UPDATE: local filesystem path
  cpuset: "2-7"                                     # UPDATE: available CPU cores
  memory: "16G"                                     # UPDATE: available memory
  llm_budget: 10                                    # LLM budget in USD
  additional_env:
    # Override CRS defaults here. Optional prepare-phase CLI pin:
    #   GEMINI_CLI_VERSION: 0.28.2
    # Available models:
    #   gemini-3-pro-preview, gemini-3-flash-preview
    CRS_AGENT: gemini_cli
    GEMINI_MODEL: gemini-3-pro-preview
    # AGENT_TIMEOUT: "3600"                          # Optional: seconds, 0 = no limit (default)

# --- Optional LLM Configuration --------------------------------------------
# Uncomment if you want OSS-CRS to inject an external LiteLLM endpoint.
# llm_config:
#   litellm:
#     mode: external
#     external:
#       url_env: EXTERNAL_LITELLM_API_BASE
#       key_env: EXTERNAL_LITELLM_API_KEY
